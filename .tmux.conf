set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0

# change prefix to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# window split
unbind %
bind | split-window -h
unbind '"'
bind - split-window

# reload config
unbind r
bind r source-file ~/.tmux.conf

# resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

set-option -g status-position top

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane
set -g base-index 1
setw -g pane-base-index 1

# direnv: clear stale env vars when creating new windows/panes
set-option -g update-environment "DIRENV_DIFF DIRENV_DIR DIRENV_WATCHES"
set-environment -gu DIRENV_DIFF
set-environment -gu DIRENV_DIR
set-environment -gu DIRENV_WATCHES
set-environment -gu DIRENV_LAYOUT

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'

# plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist sessions
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto save sessions
set -g @plugin 'catppuccin/tmux#v2.1.3'  # theme

# theme config (catppuccin v2 syntax)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #{b:pane_current_path}'
set -g @catppuccin_window_current_text ' #{b:pane_current_path}'

set -g status-left '#{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_application} #{E:@catppuccin_status_date_time}'

set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'off'

if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# this line should come last
run '~/.tmux/plugins/tpm/tpm'
