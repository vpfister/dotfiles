set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0

# change prefix to C-a
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# window split
unbind %
bind | split-window -h
unbind '"'
bind - split-window

# reload config
unbind r
bind r source-file ~/.tmux.conf

# resize panes
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

bind -r m resize-pane -Z

set -g mouse on

set-window-option -g mode-keys vi

set-option -g status-position top

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel

unbind -T copy-mode-vi MouseDragEnd1Pane

# Force tmux copy-mode on left-drag, even over apps that enable mouse
# reporting (e.g. Claude Code, nvim with mouse=a). Without this, tmux forwards
# the drag to the app, never enters copy-mode, and the `y` you press to yank
# leaks into the app's input. This keeps selection pane-aware (unlike a
# terminal Shift-drag, which ignores pane splits).
# Trade-off: mouse drag no longer reaches the app; scroll-wheel is unaffected.
bind -n MouseDrag1Pane copy-mode -M
set -g base-index 1
setw -g pane-base-index 1

# direnv: clear stale env vars when creating new windows/panes
set-option -g update-environment "DIRENV_DIFF DIRENV_DIR DIRENV_WATCHES"
set-environment -gu DIRENV_DIFF
set-environment -gu DIRENV_DIR
set-environment -gu DIRENV_WATCHES
set-environment -gu DIRENV_LAYOUT

# TPM plugin manager
set -g @plugin 'tmux-plugins/tpm'

# plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'  # persist sessions
set -g @plugin 'tmux-plugins/tmux-continuum'  # auto save sessions
set -g @plugin 'catppuccin/tmux#v2.1.3'  # theme

# theme config (catppuccin v2 syntax)
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_text ' #{b:pane_current_path}'
set -g @catppuccin_window_current_text ' #{b:pane_current_path}'
set -g @catppuccin_date_time_text "%Y-%m-%d %H:%M"

# resurrect config
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'off'

# Required so install_plugins can resolve the plugin path before TPM itself runs
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"

# Bootstrap: clone TPM and install all plugins on a new machine
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Auto-install if catppuccin (or any other plugin) is missing
# catppuccin/tmux installs to ~/.tmux/plugins/tmux/ via TPM
if "test ! -d ~/.tmux/plugins/tmux" \
   "run '~/.tmux/plugins/tpm/bin/install_plugins'"

# Run catppuccin before configuring the status line (required by catppuccin v2)
run '~/.tmux/plugins/tmux/catppuccin.tmux'

# status-left: per-cluster pill (rounded, catppuccin-style) + session module.
# @cluster_name / @cluster_accent are set by cluster-theme.sh below.
# tmux defaults status-left-length to 10, which truncates the pill; raise it.
set -g status-left-length 100
set -g status-left "#[fg=#{@cluster_accent},bg=default]#{@cluster_lcap}#[fg=#{@thm_crust},bg=#{@cluster_accent},bold] #{@cluster_name} #[fg=#{@cluster_accent},bg=default,nobold]#{@cluster_rcap} #{E:@catppuccin_status_session}"
set -g status-right '#{E:@catppuccin_status_application} #{E:@catppuccin_status_date_time}'

# this line should come last
run '~/.tmux/plugins/tpm/tpm'

# Per-machine cluster styling: subtle status tint + accent pill + pane borders.
# Reads ~/.config/host-style.sh (git-excluded; copy from host-style.example.sh).
# MUST run after tpm: tpm re-sources catppuccin, which would otherwise clobber
# status-style / pane-border-style. Re-runs on `<prefix> r` (source-file).
run-shell '~/.config/tmux/cluster-theme.sh'
